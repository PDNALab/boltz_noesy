name: Install and Check Boltz Package

on:
  push:
    branches:
      - main
      - noesy_model2
  workflow_dispatch:

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Create virtual environment
        run: |
          python -m venv boltz_env
      - name: Install package and test deps
        run: |
          source boltz_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"
      - name: Create trifast stub to avoid GPU import error in CI
        run: |
          mkdir -p trifast
          cat > trifast/__init__.py <<'PY'
# Minimal CI stub for trifast to avoid CUDA probes during import
from . import torch as torch
from .primitives import triangle_attention
PY
          cat > trifast/primitives.py <<'PY'
def triangle_attention(*args, **kwargs): return None
PY
          cat > trifast/torch.py <<'PY'
class cuda:
    @staticmethod
    def get_device_capability(device=0): return (0, 0)
    @staticmethod
    def is_available(): return False
PY
      - name: Run tests (discovery)
        run: |
          source boltz_env/bin/activate
          python -m pytest -q