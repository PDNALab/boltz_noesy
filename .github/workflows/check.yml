name: Install and Check Boltz Package

on:
  push:
    branches:
      - main
      - noesy_model2

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create virtual environment
        run: |
          python -m venv boltz_env
          echo "Virtual environment created."

      - name: Install package and test deps
        run: |
          source boltz_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"

      - name: Debug repository layout
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ -d boltz ]; then echo "Found subdir 'boltz':"; ls -la boltz || true; fi

      - name: Create trifast stub to avoid GPU import error in CI
        run: |
          # create minimal trifast package to shadow the GPU package in CI
          mkdir -p trifast
          cat > trifast/__init__.py <<'PY'
# Minimal CI stub for trifast to avoid CUDA probes during import
from . import torch as torch  # expose submodule
from .primitives import triangle_attention
PY
          cat > trifast/primitives.py <<'PY'
# simple placeholder for triangle_attention used by tests during collection
def triangle_attention(*args, **kwargs):
    return None
PY
          cat > trifast/torch.py <<'PY'
# stub trifast.torch to avoid calling real torch.cuda at import time
class cuda:
    @staticmethod
    def get_device_capability(device=0):
        return (0, 0)
    @staticmethod
    def is_available():
        return False
PY
          cat > trifast/triton.py <<'PY'
# minimal stub
PY
          cat > trifast/autotune.py <<'PY'
# minimal stub
def autotune(*args, **kwargs):
    return None
PY
          echo "trifast stub created"

      - name: Run tests (discovery)
        run: |
          source boltz_env/bin/activate
          echo "Running pytest discovery..."
          python -m pytest -q