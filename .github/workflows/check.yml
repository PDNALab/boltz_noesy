name: Install and Check Boltz Package

on:
  push:
    branches:
      - main
      - noesy_model2

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create virtual environment
        run: |
          python -m venv boltz_env
          echo "Virtual environment created."

      - name: Install package and test deps
        run: |
          source boltz_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"

      - name: Debug repository layout
        run: |
          echo "PWD: $(pwd)"
          ls -la
          echo "ls at repo root done"
          if [ -d boltz ]; then echo "Found subdir 'boltz':"; ls -la boltz || true; fi

      - name: Run tests (discovery)
        run: |
          source boltz_env/bin/activate
          CUDA_VISIBLE_DEVICES="" python -m pytest -q
