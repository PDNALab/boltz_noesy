name: Install and Check Boltz Package

on:
  push:
    branches:
      - main
      - noesy_model2
  pull_request:
  workflow_dispatch:

jobs:
  install-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Create virtual environment
        run: |
          python -m venv boltz_env
          echo "Virtual environment created."

      - name: Create trifast stub to avoid GPU import on CI
        run: |
          mkdir -p trifast
          cat > trifast/__init__.py <<'PY'
# CI stub for trifast to avoid GPU probes during import
from . import torch as torch
from .primitives import triangle_attention
PY
          cat > trifast/primitives.py <<'PY'
def triangle_attention(*args, **kwargs): return None
PY
          cat > trifast/torch.py <<'PY'
class cuda:
    @staticmethod
    def get_device_capability(device=0): return (0,0)
    @staticmethod
    def is_available(): return False
PY
          cat > trifast/triton.py <<'PY'
# minimal stub
PY
          cat > trifast/autotune.py <<'PY'
def autotune(*args, **kwargs): return None
PY
          echo "trifast stub created in repo root"

      - name: Install package and test deps
        run: |
          source boltz_env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"

      - name: Debug repository layout
        run: |
          echo "PWD: $(pwd)"
          ls -la

      - name: Run tests (discovery)
        env:
          CUDA_VISIBLE_DEVICES: ""
        run: |
          source boltz_env/bin/activate
          python -m pytest -q